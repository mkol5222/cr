name: Publish sparfenyuk-mcp-proxy-with-npx_uv image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-sparfenyuk-mcp-proxy-with-npx_uv
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image coordinates
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_REGISTRY=ghcr.io" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${owner}/sparfenyuk-mcp-proxy-with-npx_uv" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=latest" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./sparfenyuk-mcp-proxy-with-npx_uv
          file: ./sparfenyuk-mcp-proxy-with-npx_uv/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Manual GHCR image for sparfenyuk-mcp-proxy-with-npx_uv